name: Grupo-4

on:
  push:
    branches:
      - main
env:
  NOMBRE_GRUPO: "Grupo Nro4"
  CURSO: "Herramientas de Desarrollo"
  MOSTRAR_DESPEDIDA: "true"

jobs:
  workflow-grupo:
    runs-on: ubuntu-latest

    steps:
      
      - name: Prueba de mensajes
        run: |
          echo "Hola, bienvenidos integrantes del $NOMBRE_GRUPO"
          
      - name: Variables creada en el workflow
        run: |
          echo "Variable 1 - NOMBRE_GRUPO: $NOMBRE_GRUPO"
          echo "Variable 2 - CURSO: $CURSO"
          echo "Variable 3 - MOSTRAR_DESPEDIDA: $MOSTRAR_DESPEDIDA"






    
